<style>
        body {
            background-color: #0b1326;
            color: #dae2fd;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card.active {
            background: rgba(173, 198, 255, 0.1);
            border-color: #adc6ff;
            box-shadow: 0 0 20px rgba(173, 198, 255, 0.2);
        }
        .intelligence-gradient {
            background: linear-gradient(135deg, #adc6ff 0%, #4d8eff 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active .material-symbols-outlined {
            font-variation-settings: 'FILL' 1;
        }
        .selection-indicator {
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.2s ease;
        }
        .active .selection-indicator {
            opacity: 1;
            transform: scale(1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen">
<!-- Top App Bar (Suppressing global nav as per Transactional/Onboarding rule) -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-white/10">
<div class="flex justify-between items-center px-gutter py-xs w-full max-w-container-max mx-auto h-16">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary" style="font-size: 28px;">navigation</span>
<span class="font-display-lg-mobile text-headline-md text-primary tracking-tight">Career GPS</span>
</div>
<button class="text-on-surface-variant hover:opacity-80 transition-opacity p-2">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col pt-24 pb-32 px-gutter max-w-lg mx-auto w-full">
<!-- Header Section -->
<section class="mb-lg space-y-xs">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface leading-tight">Define your journey.</h1>
<p class="font-body-md text-body-md text-on-surface-variant opacity-80">Select your profile type to personalize your AI-guided career path.</p>
</section>
<!-- Selection Grid -->
<div class="flex flex-col gap-sm" id="selection-container">
<!-- Student Card -->
<button class="glass-card w-full p-md rounded-xl flex items-center gap-md text-left group relative overflow-hidden" data-type="student" onclick="selectType(this)">
<div class="w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" style="font-size: 32px;">school</span>
</div>
<div class="flex-grow pr-8">
<h3 class="font-headline-md text-on-surface mb-1">Student</h3>
<p class="font-body-md text-label-sm text-on-surface-variant leading-tight">Explore degrees, internships, and build your early career foundation.</p>
</div>
<div class="selection-indicator absolute right-6 top-1/2 -translate-y-1/2 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Professional Card -->
<button class="glass-card w-full p-md rounded-xl flex items-center gap-md text-left group relative overflow-hidden" data-type="professional" onclick="selectType(this)">
<div class="w-12 h-12 rounded-lg bg-tertiary/10 flex items-center justify-center text-tertiary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" style="font-size: 32px;">work</span>
</div>
<div class="flex-grow pr-8">
<h3 class="font-headline-md text-on-surface mb-1">Professional</h3>
<p class="font-body-md text-label-sm text-on-surface-variant leading-tight">Navigate transitions, master high-income skills, and track market trends.</p>
</div>
<div class="selection-indicator absolute right-6 top-1/2 -translate-y-1/2 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Parent Card -->
<button class="glass-card w-full p-md rounded-xl flex items-center gap-md text-left group relative overflow-hidden" data-type="parent" onclick="selectType(this)">
<div class="w-12 h-12 rounded-lg bg-secondary/10 flex items-center justify-center text-secondary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" style="font-size: 32px;">family_restroom</span>
</div>
<div class="flex-grow pr-8">
<h3 class="font-headline-md text-on-surface mb-1">Parent</h3>
<p class="font-body-md text-label-sm text-on-surface-variant leading-tight">Guide your child's education with data-backed insights and future scoping.</p>
</div>
<div class="selection-indicator absolute right-6 top-1/2 -translate-y-1/2 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
</div>
<!-- Atmospheric Background Element -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] bg-secondary/5 blur-[120px] rounded-full"></div>
</div>
</main>
<!-- Fixed Action Area (Thumb-friendly) -->
<footer class="fixed bottom-0 left-0 w-full p-gutter bg-surface/90 backdrop-blur-2xl border-t border-white/5 z-50">
<div class="max-w-lg mx-auto flex flex-col gap-sm">
<button class="intelligence-gradient w-full py-4 px-lg rounded-xl font-headline-md text-on-primary shadow-lg shadow-primary/20 disabled:opacity-30 disabled:grayscale disabled:cursor-not-allowed transition-all active:scale-[0.98]" disabled="" id="continue-btn">
                Continue
            </button>
<p class="text-center text-label-sm text-on-surface-variant opacity-60">Step 1 of 4: Profile Selection</p>
</div>
</footer>
<script>
        function selectType(element) {
            // Remove active class from all buttons
            const buttons = document.querySelectorAll('.glass-card');
            buttons.forEach(btn => btn.classList.remove('active'));

            // Add active class to clicked button
            element.classList.add('active');

            // Enable the continue button
            const continueBtn = document.getElementById('continue-btn');
            continueBtn.removeAttribute('disabled');
            
            // Add a subtle haptic-like scale effect on click
            element.style.transform = 'scale(0.98)';
            setTimeout(() => {
                element.style.transform = 'scale(1)';
            }, 100);

            // Animate button entry state
            if(continueBtn.disabled === false) {
                continueBtn.classList.add('animate-pulse');
                setTimeout(() => continueBtn.classList.remove('animate-pulse'), 500);
            }
        }
    </script>
</body></html>
