<!-- Floating AI Assistant Placeholder (Suppressed on selection screen for focus) -->
<script>
        function selectLanguage(element) {
            // Remove active classes from all cards
            const cards = document.querySelectorAll('.language-card');
            cards.forEach(card => {
                card.classList.remove('language-card-active');
                const icon = card.querySelector('.check-icon span');
                icon.textContent = 'circle';
                icon.style.fontVariationSettings = "'FILL' 0";
                card.querySelector('.check-icon').classList.remove('text-primary');
                card.querySelector('.check-icon').classList.add('text-on-surface-variant/20');
            });

            // Add active class to clicked card
            element.classList.add('language-card-active');
            const activeIcon = element.querySelector('.check-icon span');
            activeIcon.textContent = 'check_circle';
            activeIcon.style.fontVariationSettings = "'FILL' 1";
            element.querySelector('.check-icon').classList.add('text-primary');
            element.querySelector('.check-icon').classList.remove('text-on-surface-variant/20');

            // Trigger micro-interaction
            element.classList.add('scale-[0.98]');
            setTimeout(() => {
                element.classList.remove('scale-[0.98]');
            }, 100);
        }

        // Handle CTA click
        document.getElementById('continue-btn').addEventListener('click', function() {
            this.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Processing...';
            setTimeout(() => {
                // Mock transition to next step
                window.scrollTo({ top: 0, behavior: 'smooth' });
                location.reload(); // Just refresh for the demo
            }, 800);
        });
    </script>
