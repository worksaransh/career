<script>
        // OTP Focus Logic
        const inputs = document.querySelectorAll('#otp-container input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Timer Logic
        let timeLeft = 59;
        const timerDisplay = document.getElementById('timer-display');
        const resendBtn = document.getElementById('resend-btn');

        const timerInterval = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timerDisplay.parentElement.classList.add('hidden');
                resendBtn.classList.remove('hidden');
            } else {
                timeLeft--;
                const seconds = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
                timerDisplay.textContent = `Resend in 00:${seconds}`;
            }
        }, 1000);

        // Success Simulation
        const verifyBtn = document.querySelector('button.intelligence-gradient');
        const overlay = document.getElementById('success-overlay');
        const successCircle = document.getElementById('success-circle');

        verifyBtn.addEventListener('click', () => {
            // Check if all inputs are filled (demo logic)
            const allFilled = Array.from(inputs).every(input => input.value.length === 1);
            
            if (allFilled) {
                overlay.classList.remove('opacity-0', 'pointer-events-none');
                setTimeout(() => {
                    successCircle.classList.remove('scale-0');
                    successCircle.classList.add('scale-100');
                }, 100);
            } else {
                // Shake effect for feedback
                const container = document.getElementById('otp-container');
                container.classList.add('animate-bounce');
                setTimeout(() => container.classList.remove('animate-bounce'), 500);
            }
        });

        // Micro-interactions for resend
        resendBtn.addEventListener('click', () => {
            alert('A new code has been sent to your device.');
            // Reset timer demo
            timeLeft = 59;
            resendBtn.classList.add('hidden');
            timerDisplay.parentElement.classList.remove('hidden');
        });
    </script>
