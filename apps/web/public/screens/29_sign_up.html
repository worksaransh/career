<body class="min-h-screen flex flex-col overflow-x-hidden font-body-md text-body-md-mobile">
<!-- Hero Background Animation -->
<div class="fixed inset-0 -z-10">
<div class="absolute inset-0 bg-gradient-to-b from-background via-transparent to-background"></div>
</div>
<!-- Main Content -->
<main class="flex-grow flex flex-col items-center justify-center px-gutter py-lg max-w-[480px] mx-auto w-full">
<!-- Brand Identity -->
<div class="text-center mb-lg stagger-in" style="animation-delay: 0.1s">
<div class="inline-flex items-center justify-center p-3 rounded-xl glass-panel mb-md ai-glow">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface mb-xs tracking-tight">Career GPS</h1>
<p class="text-on-surface-variant font-body-md px-4">Navigate your professional journey with precision-engineered AI guidance.</p>
</div>
<!-- Signup Form -->
<div class="w-full glass-panel rounded-2xl p-sm md:p-md stagger-in relative overflow-hidden" style="animation-delay: 0.2s">
<div class="absolute top-0 left-0 w-full h-1 shimmer-bg"></div>
<form class="space-y-sm" onsubmit="event.preventDefault();">
<!-- Full Name -->
<div class="space-y-xs">
<label class="block text-label-sm font-label-sm text-on-surface-variant uppercase tracking-wider ml-1" for="fullname">Full Name</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-md py-3 text-on-surface placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all duration-300" id="fullname" name="fullname" placeholder="Enter your full name" type="text"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">person</span>
</div>
</div>
<!-- Email Address -->
<div class="space-y-xs">
<label class="block text-label-sm font-label-sm text-on-surface-variant uppercase tracking-wider ml-1" for="email">Email Address</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-md py-3 text-on-surface placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all duration-300" id="email" name="email" placeholder="name@company.com" type="email"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
</div>
</div>
<!-- Password -->
<div class="space-y-xs">
<label class="block text-label-sm font-label-sm text-on-surface-variant uppercase tracking-wider ml-1" for="password">Password</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-md py-3 text-on-surface placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all duration-300" id="password" name="password" placeholder="Min. 8 characters" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Terms & Conditions -->
<div class="flex items-start gap-3 pt-xs stagger-in" style="animation-delay: 0.3s">
<div class="relative flex items-center h-5">
<input class="w-5 h-5 rounded-md border-outline-variant bg-surface-container-lowest text-primary focus:ring-primary focus:ring-offset-0 focus:ring-offset-transparent transition-all cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="text-label-sm font-label-sm text-on-surface-variant leading-tight cursor-pointer" for="terms">
                        I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Primary Action -->
<button class="w-full intelligence-gradient text-on-primary font-headline-md py-4 rounded-xl shadow-lg active:scale-95 transition-transform duration-200 mt-md flex items-center justify-center gap-2 group" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-md stagger-in" style="animation-delay: 0.4s">
<div class="h-[1px] flex-grow bg-outline-variant"></div>
<span class="text-label-sm font-label-sm text-outline">OR CONTINUE WITH</span>
<div class="h-[1px] flex-grow bg-outline-variant"></div>
</div>
<!-- Social OAuth -->
<div class="grid grid-cols-2 gap-sm stagger-in" style="animation-delay: 0.5s">
<button class="flex items-center justify-center gap-2 bg-surface-container-low border border-outline-variant rounded-xl py-3 hover:bg-surface-bright transition-colors active:scale-[0.98]">

<span class="text-label-sm font-label-sm">Google</span>
</button>
<button class="flex items-center justify-center gap-2 bg-surface-container-low border border-outline-variant rounded-xl py-3 hover:bg-surface-bright transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined text-xl">apps</span>
<span class="text-label-sm font-label-sm">Apple</span>
</button>
</div>
</div>
<!-- Footer Link -->
<p class="mt-lg text-body-md text-on-surface-variant stagger-in" style="animation-delay: 0.6s">
            Already have an account? <a class="text-primary font-bold hover:underline" href="#">Sign In</a>
</p>
</main>
<!-- Success Feedback Overlay (Hidden by default) -->
<div class="fixed inset-0 z-[100] bg-background/80 backdrop-blur-md flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500" id="success-overlay">
<div class="glass-panel p-lg rounded-3xl text-center max-w-[320px] scale-90 transition-transform duration-500">
<div class="w-20 h-20 rounded-full intelligence-gradient flex items-center justify-center mx-auto mb-md ai-glow">
<span class="material-symbols-outlined text-on-primary text-4xl">check</span>
</div>
<h2 class="font-headline-md text-on-surface mb-xs">Welcome Aboard</h2>
<p class="text-on-surface-variant">Your career trajectory just gained an intelligent navigator.</p>
</div>
</div>
<script>
        // Micro-interactions and simple state handling
        document.querySelector('form').addEventListener('submit', (e) => {
            const overlay = document.getElementById('success-overlay');
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            overlay.querySelector('div').classList.remove('scale-90');
            overlay.querySelector('div').classList.add('scale-100');
            
            setTimeout(() => {
                // In a real app, this would redirect
                console.log("Redirecting to dashboard...");
            }, 2500);
        });

        // Floating label/focus effects
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('ai-glow');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('ai-glow');
            });
        });
    </script>
