<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<title>Forgot Password | Career GPS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Geist:wght@400;500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .intelligence-gradient {
            background: linear-gradient(135deg, #571bc1 0%, #4d8eff 100%);
        }
        .floating-label-input:focus-within label,
        .floating-label-input input:not(:placeholder-shown) + label {
            transform: translateY(-1.5rem) scale(0.85);
            color: #adc6ff;
        }
        @keyframes subtle-glow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .bg-glow {
            animation: subtle-glow 8s ease-in-out infinite;
        }
    </style>

            theme: {

                    "colors": {

                        "on-primary-fixed-variant": "#004395",
                        "primary-fixed": "#d8e2ff",

                        "on-tertiary-fixed": "#001f26",
                        "primary-fixed-dim": "#adc6ff",

                        "primary-container": "#4d8eff",
                        "on-primary": "#002e6a",
                        "surface-container-low": "#131b2e",
                        "background": "#0b1326",

                        "secondary": "#d0bcff",
                        "secondary-fixed": "#e9ddff",
                        "primary": "#adc6ff",
                        "surface-container-lowest": "#060e20",
                        "surface-variant": "#2d3449",
                        "on-background": "#dae2fd",
                        "secondary-fixed-dim": "#d0bcff",
                        "tertiary-fixed-dim": "#4cd7f6",
                        "on-surface": "#dae2fd",
                        "on-secondary": "#3c0091",
                        "tertiary-container": "#009eb9",
                        "on-error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#5516be",
                        "error": "#ffb4ab",
                        "on-error-container": "#ffdad6",
                        "secondary-container": "#571bc1",
                        "on-surface-variant": "#c2c6d6",
                        "on-tertiary-container": "#002f38",
                        "surface-tint": "#adc6ff",
                        "on-primary-fixed": "#001a42",
                        "outline": "#8c909f",
                        "surface": "#0b1326",
                        "inverse-surface": "#dae2fd",
                        "tertiary": "#4cd7f6",

                    "borderRadius": {

                        "gutter": "16px",
                        "container-max": "1200px",

                    },
                    "fontFamily": {

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- Atmospheric Background Particles/Glow -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="bg-glow absolute -top-[10%] -left-[10%] w-[60%] h-[60%] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="bg-glow absolute -bottom-[10%] -right-[10%] w-[60%] h-[60%] rounded-full bg-secondary/10 blur-[120px]" style="animation-delay: -4s;"></div>
</div>
<!-- Header (Shell Suppressed per transactional rules, but Brand Anchor retained for context) -->
<header class="fixed top-0 w-full z-50 px-gutter py-md flex justify-center pointer-events-none">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="font-display-lg-mobile text-display-lg-mobile text-primary tracking-tight pointer-events-auto">Career GPS</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-gutter pt-xl pb-md relative z-10">
<div class="w-full max-w-md">
<!-- Back Action -->
<button class="group flex items-center gap-2 mb-lg text-on-surface-variant hover:text-primary transition-colors duration-200" onclick="window.history.back()">
<span class="material-symbols-outlined text-[20px] group-active:scale-75 transition-transform">arrow_back_ios</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">Back to Login</span>
</button>
<!-- Forgot Password Panel -->
<div class="glass-panel p-md md:p-lg rounded-[2rem] shadow-2xl relative overflow-hidden">
<!-- AI Sparkle Decorative -->
<div class="absolute top-0 right-0 p-gutter opacity-20">
<span class="material-symbols-outlined text-primary text-6xl">psychology</span>
</div>
<div class="relative z-10">
<h1 class="font-headline-md text-headline-md-mobile md:text-headline-md mb-xs text-on-surface">Forgot Password</h1>
<p class="text-on-surface-variant font-body-md mb-lg">Enter your email to receive an OTP</p>
<form class="space-y-lg" onsubmit="return false;">
<!-- Floating Label Email Input -->
<div class="floating-label-input relative group">
<input class="w-full bg-surface-container-low/50 border border-outline-variant/30 rounded-xl px-4 py-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/30 transition-all duration-300 peer" id="email" placeholder=" " required="" type="email"/>
<label class="absolute left-4 top-4 text-on-surface-variant pointer-events-none transition-all duration-300 font-body-md origin-left" for="email">
                                Email address
                            </label>
<!-- Focus Glow Effect -->
<div class="absolute inset-0 -z-10 rounded-xl bg-primary/5 opacity-0 group-focus-within:opacity-100 blur-md transition-opacity"></div>
</div>
<!-- Action Button -->
<div class="pt-sm">
<button class="intelligence-gradient w-full py-4 rounded-xl font-bold text-white shadow-lg active:scale-95 transition-transform duration-200 flex items-center justify-center gap-2 group overflow-hidden relative">
<span class="relative z-10">Send Reset Link</span>
<span class="material-symbols-outlined relative z-10 transition-transform group-hover:translate-x-1">arrow_forward</span>
<!-- Shine Effect -->
<div class="absolute top-0 -left-full w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent group-hover:left-full transition-all duration-700 ease-in-out"></div>
</button>
</div>
</form>
<!-- Help Links -->
<div class="mt-lg pt-lg border-t border-white/5 flex flex-col items-center gap-base">
<p class="font-label-sm text-label-sm text-on-surface-variant">Having trouble?</p>
<a class="text-primary font-body-md hover:underline decoration-primary/30 underline-offset-4" href="#">Contact AI Support</a>
</div>
</div>
</div>
<!-- Contextual Graphic / Logo Detail -->
<div class="mt-xl flex justify-center opacity-30">
<div class="flex flex-col items-center gap-4">
<div class="w-12 h-[1px] bg-gradient-to-r from-transparent via-primary to-transparent"></div>
<p class="font-label-sm text-label-sm tracking-[0.2em] uppercase text-on-surface-variant">Secured by AI Guardian</p>
</div>
</div>
</div>
</main>
<!-- Visual Footer Decor -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-primary/50 via-secondary/50 to-primary/50 blur-sm opacity-30"></div>
<script>
        // Simple Interaction Feedback
        const form = document.querySelector('form');
        const submitBtn = form.querySelector('button');

        submitBtn.addEventListener('click', (e) => {
            const emailInput = document.getElementById('email');
            if (emailInput.validity.valid) {
                submitBtn.innerHTML = `
                    <span class="flex items-center gap-3">
                        <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Sending Link...
                    </span>
                `;
                
                // Mock success state transition
                setTimeout(() => {
                    const container = document.querySelector('.glass-panel');
                    container.style.opacity = '0';
                    container.style.transform = 'translateY(-20px)';
                    container.style.transition = 'all 0.5s ease-out';
                    
                    setTimeout(() => {
                        container.innerHTML = `
                            <div class="flex flex-col items-center py-lg text-center">
                                <div class="w-16 h-16 rounded-full bg-primary/20 flex items-center justify-center mb-md">
                                    <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">mark_email_read</span>
                                </div>
                                <h2 class="font-headline-md text-on-surface mb-xs">Check your inbox</h2>
                                <p class="text-on-surface-variant font-body-md mb-lg">We've sent a recovery link to ${emailInput.value}</p>
                                <button onclick="location.reload()" class="font-label-sm text-primary uppercase tracking-widest border border-primary/20 px-6 py-2 rounded-full hover:bg-primary/10 transition-colors">Resend Email</button>
                            </div>
                        `;
                        container.style.opacity = '1';
                        container.style.transform = 'translateY(0)';
                    }, 500);
                }, 1500);
            }
        });
    </script>
</body></html>
