<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md selection:bg-primary/30">
<!-- Global Background Shader -->
<div class="fixed inset-0 z-[-1] overflow-hidden opacity-40">
</div>
<!-- Main Navigation Content (Suppressing Nav Bar for Task Focus) -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-white/10 shadow-sm">
<div class="flex justify-between items-center px-gutter py-xs w-full max-w-container-max mx-auto">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-3xl">explore</span>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary tracking-tight md:text-headline-md">Career GPS</h1>
</div>
<div class="w-10 h-10 rounded-full border border-primary/20 p-0.5">
<div class="w-full h-full rounded-full overflow-hidden" data-alt="A professional studio portrait of a confident young Indian professional woman smiling, with soft cinematic lighting and a blurred high-tech office background in deep blues and electric accents." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDhNBqPMQnpNPX8tBPP4rLTZiEpcnmrgWoOZWWmPvr4neaD-j3yTtoBIeuctzFPQuOoMgAw7D97FErs-_hMdqM2wEBGf2As3dOVX0G8HhiqlMxXwYU2KoODrrmYgWDKTPMBV55FCPKS3kIQzUTIvcRmjRXpxl_YkzblgMJv2SIsmtCZbcOJDhFEQ_DhdyJlc7e99hDm3fkez7jIKXuU_xD8GZDX-MbIIzS_ThpFv--uBHNQft8P_qI5c2Plctm4TLTXI_fDT9MOlX4H')"></div>
</div>
</div>
</header>
<main class="flex-grow pt-32 pb-16 px-gutter flex flex-col items-center justify-center">
<div class="w-full max-w-md space-y-8">
<!-- AI Assistant Bubble -->
<div class="flex items-start gap-4 mb-8">
<div class="w-12 h-12 rounded-full intelligence-gradient flex items-center justify-center flex-shrink-0 shadow-[0_0_20px_rgba(173,198,255,0.4)] ai-pulse">
<span class="material-symbols-outlined text-on-primary-fixed text-2xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<div class="glass-card rounded-2xl rounded-tl-none p-4 relative">
<p class="text-on-surface font-body-md">This helps me find local opportunities for you!</p>
<div class="absolute -left-2 top-0 w-2 h-2 bg-white/5" style="clip-path: polygon(100% 0, 0 0, 100% 100%);"></div>
</div>
</div>
<!-- Header and Progress -->
<div class="space-y-4">
<div class="flex justify-between items-end">
<h2 class="font-headline-md text-headline-md-mobile md:text-headline-md text-on-surface">Tell us about yourself</h2>
<span class="font-label-sm text-label-sm text-primary uppercase tracking-widest">Step 2 of 15</span>
</div>
<!-- Progress Bar -->
<div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary w-[13.33%] rounded-full shadow-[0_0_10px_#adc6ff]"></div>
</div>
</div>
<!-- Form Content -->
<form class="space-y-6">
<!-- Full Name -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant block ml-1">Full Name</label>
<div class="relative group glow-input glass-card rounded-xl border border-white/10 transition-all duration-300">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">person</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-on-surface focus:ring-0 placeholder:text-outline-variant font-body-md" placeholder="Arjun Sharma" required="" type="text" value="Arjun Sharma"/>
</div>
</div>
<!-- Date of Birth -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant block ml-1">Date of Birth</label>
<div class="relative group glow-input glass-card rounded-xl border border-white/10 transition-all duration-300">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">calendar_today</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-on-surface focus:ring-0 placeholder:text-outline-variant font-body-md [color-scheme:dark]" required="" type="date"/>
</div>
</div>
<!-- Location -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant block ml-1">Current Location</label>
<div class="relative group glow-input glass-card rounded-xl border border-white/10 transition-all duration-300">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">location_on</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-on-surface focus:ring-0 placeholder:text-outline-variant font-body-md" placeholder="Mumbai, Maharashtra" required="" type="text"/>
</div>
</div>
<!-- CTA Button -->
<button class="w-full intelligence-gradient text-on-primary-fixed py-5 rounded-xl font-headline-md font-bold text-headline-md-mobile flex items-center justify-center gap-2 group active:scale-95 transition-all duration-200 shadow-[0_8px_30px_rgba(77,142,255,0.3)]" type="submit">
                    Next
                    <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</form>
<!-- Decorative Element -->
<div class="pt-8 flex justify-center">
<div class="flex gap-1.5">
<div class="w-1.5 h-1.5 rounded-full bg-primary/20"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/40"></div>

<div class="w-1.5 h-1.5 rounded-full bg-primary/20"></div>
</div>
</div>

</main>
<!-- Floating AI Bubble (Secondary context) -->
<div class="fixed bottom-8 right-8 z-50 hidden md:block">
<button class="w-14 h-14 rounded-full intelligence-gradient flex items-center justify-center shadow-2xl active:scale-90 transition-transform group">
<span class="material-symbols-outlined text-on-primary-fixed text-2xl group-hover:rotate-12 transition-transform">chat_bubble</span>
</button>
</div>
<!-- Background Elements -->
<div class="fixed top-1/4 -right-20 w-80 h-80 bg-primary/10 blur-[120px] rounded-full z-[-1]"></div>
<div class="fixed bottom-1/4 -left-20 w-80 h-80 bg-tertiary/10 blur-[120px] rounded-full z-[-1]"></div>
<script>
        // Simple Interaction logic for Next button
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> Processing...`;
            btn.classList.add('opacity-80');
            
            setTimeout(() => {
                alert('Onboarding logic would proceed to Step 3.');
                btn.innerHTML = originalContent;
                btn.classList.remove('opacity-80');
            }, 1500);
        });

        // Autofill logic simulation
        window.addEventListener('DOMContentLoaded', () => {
            console.log('Career GPS AI: Autofilling verified identity data...');
        });
    </script>
