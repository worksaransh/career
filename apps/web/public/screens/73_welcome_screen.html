<!-- Floating AI Sparkle Micro-interaction -->
<div class="fixed inset-0 pointer-events-none z-50" id="sparkle-container"></div>
<script>
        // Micro-interaction: Subtle sparkle follow
        document.addEventListener('touchstart', (e) => {
            createSparkle(e.touches[0].clientX, e.touches[0].clientY);
        });

        function createSparkle(x, y) {
            const container = document.getElementById('sparkle-container');
            const sparkle = document.createElement('div');
            sparkle.className = 'absolute w-1 h-1 bg-primary rounded-full blur-[2px] opacity-0 transition-all duration-700';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            container.appendChild(sparkle);
            
            requestAnimationFrame(() => {
                sparkle.style.opacity = '0.8';
                sparkle.style.transform = `translate(${(Math.random() - 0.5) * 40}px, ${(Math.random() - 0.5) * 40}px) scale(2)`;
            });

            setTimeout(() => sparkle.remove(), 700);
        }

        // Intersection Observer for scroll animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('opacity-100', 'translate-y-0');
                    entry.target.classList.remove('opacity-0', 'translate-y-4');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.glass-card').forEach(card => {
            card.classList.add('transition-all', 'duration-700', 'opacity-0', 'translate-y-4');
            observer.observe(card);
        });
    </script>
