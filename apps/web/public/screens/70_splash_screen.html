<style>
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .shimmer-effect {
            position: relative;
            overflow: hidden;
        }
        .shimmer-effect::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.03),
                transparent
            );
            animation: shimmer 3s infinite;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .intelligence-glow {
            background: radial-gradient(circle at center, rgba(173, 198, 255, 0.15) 0%, transparent 70%);
        }
        .logo-gradient-text {
            background: linear-gradient(135deg, #adc6ff 0%, #d0bcff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        body {
            background-color: #0b1326;
            margin: 0;
            overflow: hidden;
        }
    </style>

<body class="bg-background text-on-background flex flex-col items-center justify-center min-h-screen p-gutter overflow-hidden">
<!-- Atmospheric Background Layers -->
<div class="fixed inset-0 pointer-events-none z-0">
<!-- AI Radial Glow -->
<div class="absolute inset-0 intelligence-glow opacity-60"></div>
<!-- Subtle Shimmer Overlay -->
<div class="absolute inset-0 shimmer-effect opacity-20"></div>
<!-- Noise Texture Simulation via Gradient -->
<div class="absolute inset-0 bg-[radial-gradient(#ffffff05_1px,transparent_1px)] [background-size:40px_40px] opacity-30"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-center w-full max-w-sm mx-auto text-center">
<!-- Animated Logo Container -->
<div class="relative mb-md transition-all duration-1000 transform scale-100 opacity-100" id="logo-container">
<!-- Pulsing outer ring -->
<div class="absolute inset-0 rounded-full border border-primary/20 animate-ping duration-[3000ms]"></div>
<!-- Glass Logo Hexagon -->
<div class="glass-card w-24 h-24 rounded-2xl flex items-center justify-center relative overflow-hidden shadow-[0_0_40px_rgba(173,198,255,0.1)]">
<!-- Internal Gradient Shine -->
<div class="absolute -inset-2 bg-gradient-to-tr from-secondary/20 via-primary/10 to-transparent blur-xl"></div>
<!-- Main Icon -->
<span class="material-symbols-outlined text-[48px] logo-gradient-text" style="font-variation-settings: 'FILL' 1;">
                    explore
                </span>
</div>
</div>
<!-- Brand Headline -->
<div class="space-y-xs">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface tracking-tighter logo-gradient-text">
                Career GPS
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant/80 tracking-wide">
                Navigating your professional future.
            </p>
</div>
<!-- Loading Indicator -->
<div class="mt-lg w-48 h-[2px] bg-white/10 rounded-full overflow-hidden relative">
<div class="absolute inset-y-0 left-0 bg-primary shadow-[0_0_12px_#adc6ff] transition-all duration-300 rounded-full" id="progress-bar" style="width: 0%"></div>
</div>
</main>
<!-- Footer Identity -->
<footer class="fixed bottom-xl left-0 w-full flex flex-col items-center justify-center space-y-xs opacity-60">
<div class="flex items-center space-x-2">
<span class="material-symbols-outlined text-[16px] text-tertiary" style="font-variation-settings: 'FILL' 1;">
                auto_awesome
            </span>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-[0.2em]">
                Powered by AI
            </span>
</div>
<div class="h-1 w-1 bg-primary rounded-full animate-pulse shadow-[0_0_8px_#adc6ff]"></div>
</footer>
<!-- Interactive Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('progress-bar');
            const logo = document.getElementById('logo-container');
            
            // Artificial load sequence
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 100) {
                    progress = 100;
                    clearInterval(interval);
                    
                    // Subtle entrance finish
                    logo.classList.add('scale-105');
                    setTimeout(() => {
                        logo.classList.remove('scale-105');
                    }, 500);
                }
                progressBar.style.width = `${progress}%`;
            }, 150);

            // Micro-interaction on logo tap
            logo.addEventListener('touchstart', () => {
                logo.style.transform = 'scale(0.95)';
            });
            logo.addEventListener('touchend', () => {
                logo.style.transform = 'scale(1)';
            });
        });
    </script>
</body></html>
