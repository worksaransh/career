<style>
        :root {
            --primary-glow: #adc6ff;
            --secondary-glow: #d0bcff;
        }

        body {
            background-color: #0b1326;
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .grid-background {
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        @keyframes rotate-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .pulse-element {
            position: absolute;
            border: 1px solid var(--primary-glow);
            border-radius: 50%;
            animation: pulse-ring 3s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }

        .pulse-element:nth-child(2) { animation-delay: 1s; }
        .pulse-element:nth-child(3) { animation-delay: 2s; }

        .compass-ring {
            border: 2px dashed rgba(173, 198, 255, 0.2);
            animation: rotate-slow 12s linear infinite;
        }

        .glass-card {
            background: rgba(23, 31, 51, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .shimmer-text {
            background: linear-gradient(90deg, #dae2fd 0%, #adc6ff 50%, #dae2fd 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .status-enter {
            animation: slideUp 0.5s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
